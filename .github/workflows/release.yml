name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: npm install

      - name: build tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Volante ${{ github.ref_name }}"
          releaseBody: |
            ## 🏎️ Volante ${{ github.ref_name }}

            > ⚠️ **Alpha Release** — This is an early release for testing and feedback.
            > The app is primarily tested on Ubuntu 24.04. macOS and Windows builds are
            > untested and may have issues.

            ### Downloads
            See the assets below for your platform:
            - **Linux**: `.deb` (Debian/Ubuntu) or `.AppImage` (universal)
            - **macOS**: `.dmg` (aarch64 for Apple Silicon, x86_64 for Intel)
            - **Windows**: `.msi` installer

            ### What's New
            See the [CHANGELOG](https://github.com/kleinebossie/volante-desktop/blob/main/CHANGELOG.md) for details.

            ### Found a bug?
            Please [open an issue](https://github.com/kleinebossie/volante-desktop/issues/new?template=bug_report.md) with your OS, app version, and steps to reproduce.
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}
