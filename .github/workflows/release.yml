name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      # Third-party actions are pinned to full commit SHAs (not mutable tags) so a
      # compromised upstream tag cannot inject code into this contents:write job.
      # Trailing comments record the human-readable version for Dependabot.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: npm ci

      - name: build tauri app
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Volante ${{ github.ref_name }}"
          releaseBody: |
            ## 🏎️ Volante ${{ github.ref_name }}

            > ⚠️ **Alpha Release** — This is an early release for testing and feedback.
            > The app is primarily tested on Ubuntu 24.04. macOS and Windows builds are
            > untested and may have issues.

            ### Downloads
            See the assets below for your platform:
            - **Linux**: `.deb` (Debian/Ubuntu) or `.AppImage` (universal)
            - **macOS**: `.dmg` (aarch64 for Apple Silicon, x86_64 for Intel)
            - **Windows**: `.msi` installer

            ### What's New
            See the [CHANGELOG](https://github.com/kleinebossie/volante-desktop/blob/main/CHANGELOG.md) for details.

            ### Found a bug?
            Please [open an issue](https://github.com/kleinebossie/volante-desktop/issues/new?template=bug_report.md) with your OS, app version, and steps to reproduce.
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}
